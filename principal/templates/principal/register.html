{% extends 'principal/base.html' %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
              
                <div class="card-header text-white text-center py-4" style="background: linear-gradient(135deg, #2A1C45 0%, #4a2a7a 100%); border: none;">
                    <i class="fas fa-user-plus fa-3x mb-2"></i>
                    <h2 class="fw-bold mb-0">Crear Cuenta</h2>
                    <p class="opacity-75 mt-2 mb-0">Únete a MediControl y cuida tu salud</p>
                </div>
                
                <div class="card-body p-4 p-lg-5" style="background: white;">
                    <form method="POST" id="registerForm" action="{% url 'register' %}" enctype="multipart/form-data">
                        {% csrf_token %}

                      
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-dark">
                                    <i class="fas fa-user me-2" style="color: #7C3AED;"></i>Usuario
                                </label>
                                <input type="text" class="form-control form-control-lg" name="username" placeholder="Ej: daniel123" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-dark">
                                    <i class="fas fa-envelope me-2" style="color: #7C3AED;"></i>Correo Electrónico
                                </label>
                                <input type="email" class="form-control form-control-lg" name="email" placeholder="correo@ejemplo.com" required>
                            </div>
                        </div>

                        <div class="mt-3">
                            <label class="form-label fw-bold text-dark">
                                <i class="fas fa-lock me-2" style="color: #7C3AED;"></i>Contraseña
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control form-control-lg" name="password1" id="password1" placeholder="Ingresa tu contraseña" required>
                                <button type="button" class="btn btn-outline-secondary" id="togglePassword1" style="border-top-right-radius: 10px; border-bottom-right-radius: 10px;">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="progress mt-2" style="height: 6px; border-radius: 3px;">
                                <div id="passwordStrengthBar" class="progress-bar" role="progressbar" style="width: 0%;"></div>
                            </div>
                            <small id="passwordStrengthText" class="form-text text-muted"></small>
                        </div>

                        
                        <div class="mt-3">
                            <label class="form-label fw-bold text-dark">
                                <i class="fas fa-check-circle me-2" style="color: #7C3AED;"></i>Confirmar Contraseña
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control form-control-lg" name="password2" id="password2" placeholder="Confirma tu contraseña" required>
                                <button type="button" class="btn btn-outline-secondary" id="togglePassword2" style="border-top-right-radius: 10px; border-bottom-right-radius: 10px;">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <small id="passwordError" class="text-danger fw-bold"></small>
                        </div>

                     
                        <div class="mt-3">
                            <label class="form-label fw-bold text-dark">
                                <i class="fas fa-phone-alt me-2" style="color: #7C3AED;"></i>Número de teléfono
                            </label>
                            <input type="text" name="telefono" id="telefono" class="form-control form-control-lg" placeholder="+573001234567" required>
                            <small class="text-muted">Indispensable incluir el "+" y código de país.</small>
                        </div>

                 
                        <div class="mt-3">
                            <label class="form-label fw-bold text-dark">
                                <i class="fas fa-camera me-2" style="color: #7C3AED;"></i>Foto de perfil
                            </label>
                            <input type="file" class="form-control form-control-lg" name="foto" accept="image/*" required>
                            <small class="text-muted">Sube una foto para personalizar tu perfil</small>
                        </div>

                    
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-lg fw-bold text-white" style="background: linear-gradient(135deg, #7C3AED 0%, #0dcaf0 100%); border: none; border-radius: 50px; padding: 12px;">
                                <i class="fas fa-user-plus me-2"></i>Registrarse ahora
                            </button>
                        </div>

                    
                        <p class="text-center mt-4 mb-0">
                            ¿Ya tienes una cuenta? 
                            <a href="{% url 'index' %}" class="text-decoration-none fw-bold" style="color: #7C3AED;">Inicia sesión aquí</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control-lg {
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        transition: all 0.3s ease;
    }
    
    .form-control-lg:focus {
        border-color: #7C3AED;
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }
    
    .btn-outline-secondary {
        border-color: #e2e8f0;
        background: white;
    }
    
    .btn-outline-secondary:hover {
        background: #f8f9fa;
        border-color: #7C3AED;
    }
    
    .card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15) !important;
    }
    
    .progress-bar {
        transition: width 0.3s ease;
    }
</style>

<script>
    const password1 = document.getElementById('password1');
    const password2 = document.getElementById('password2');
    const passwordError = document.getElementById('passwordError');
    const form = document.getElementById('registerForm');
    const strengthBar = document.getElementById('passwordStrengthBar');
    const strengthText = document.getElementById('passwordStrengthText');


    document.getElementById('togglePassword1').addEventListener('click', function () {
        const type = password1.getAttribute('type') === 'password' ? 'text' : 'password';
        password1.setAttribute('type', type);
        this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    });

    document.getElementById('togglePassword2').addEventListener('click', function () {
        const type = password2.getAttribute('type') === 'password' ? 'text' : 'password';
        password2.setAttribute('type', type);
        this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    });

   
    password2.addEventListener('keyup', function () {
        if (password1.value !== password2.value) {
            passwordError.textContent = '⚠ Las contraseñas no coinciden';
            password2.style.borderColor = '#ef4444';
        } else {
            passwordError.textContent = '';
            password2.style.borderColor = '#e2e8f0';
        }
    });

 
    password1.addEventListener('keyup', function () {
        const val = password1.value;
        let strength = 0;
        if (val.length >= 6) strength++;
        if (/[A-Z]/.test(val)) strength++;
        if (/[0-9]/.test(val)) strength++;
        if (/[@$!%*?&#]/.test(val)) strength++;

        if (strength === 0) {
            strengthBar.style.width = '0%';
            strengthBar.className = 'progress-bar';
            strengthText.textContent = '';
        } else if (strength <= 1) {
            strengthBar.style.width = '33%';
            strengthBar.className = 'progress-bar bg-danger';
            strengthText.innerHTML = '<i class="fas fa-exclamation-triangle me-1"></i>Contraseña débil';
        } else if (strength == 2) {
            strengthBar.style.width = '66%';
            strengthBar.className = 'progress-bar bg-warning';
            strengthText.innerHTML = '<i class="fas fa-chart-line me-1"></i>Contraseña media';
        } else {
            strengthBar.style.width = '100%';
            strengthBar.className = 'progress-bar bg-success';
            strengthText.innerHTML = '<i class="fas fa-check-circle me-1"></i>Contraseña fuerte';
        }
    });


    form.addEventListener('submit', function (event) {
        event.preventDefault();

        if (password1.value !== password2.value) {
            Swal.fire({
                icon: 'error',
                title: '¡Error!',
                text: 'Las contraseñas no coinciden.',
                confirmButtonColor: '#7C3AED',
                background: '#0f172a',
                color: '#fff'
            });
            return;
        }
        
        Swal.fire({
            title: '¿Confirmar registro?',
            text: "Tus datos se guardarán en el sistema de MediControl.",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#7C3AED',
            cancelButtonColor: '#ef4444',
            confirmButtonText: '<i class="fas fa-check me-2"></i>Sí, registrarme',
            cancelButtonText: '<i class="fas fa-times me-2"></i>Cancelar',
            background: '#0f172a',
            color: '#fff'
        }).then((result) => {
            if (result.isConfirmed) {
                form.submit(); 
            }
        });
    });
</script>
{% endblock %}
