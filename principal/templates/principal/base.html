<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>{% block title %}MediControl{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<style>
* {
    box-sizing: border-box; 
}

.mc-container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

.mc-layout-grid {
    display: flex;
    flex-wrap: wrap; 
    gap: 20px;
}

.mc-panel-izquierdo {
    flex: 1 1 350px; 
}

.mc-panel-derecho {
    flex: 2 1 500px; 
}

.mc-glass-card, .mc-familiar-card {
    width: 100%;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    margin-bottom: 20px;
}

input[type="text"], 
input[type="password"], 
input[type="email"], 
button {
    width: 100%; 
    max-width: 100%;
    display: block;
}

@media (max-width: 768px) {
    .mc-container {
        padding: 10px;
    }

    .mc-layout-grid {
        flex-direction: column; 
    }

    .mc-panel-izquierdo, .mc-panel-derecho {
        flex: 1 1 100%; 
    }

    h2, h3 {
        font-size: 1.2rem; 
    }
    
    .mc-historial-item {
        flex-direction: column; 
        align-items: flex-start;
        gap: 10px;
    }
}
</style>
<body style="background: linear-gradient(135deg, #e5e7eb, #2e1f5c); margin: 0; padding: 0;">

    {% block content %}
    {% endblock %}

    <footer style="background: linear-gradient(135deg, #2A1C45, #1a1635); color: white; padding: 40px 0; margin-top: 50px;">
        <div class="container text-center">
            
            <h3 class="logo-font mb-3">
                <span style="color: var(--cian, #0DCAF0);">
                    <i class="fas fa-hand-holding-medical"></i> Medi
                </span>Control
            </h3>

            <p style="color: rgba(255,255,255,0.7); max-width: 600px; margin: 0 auto;">
                Tu aliado inteligente para el control de medicamentos, seguimiento y bienestar familiar.
            </p>

            <div class="mt-4">
                <a href="{% url 'homePanel' %}" style="color: var(--cian, #0DCAF0); margin: 0 10px; text-decoration: none;">Inicio</a>
                <a href="{% url 'homePanel' %}#section_mision" style="color: var(--cian, #0DCAF0); margin: 0 10px; text-decoration: none;">Misión</a>
                <a href="{% url 'homePanel' %}#seccion_modulos" style="color: var(--cian, #0DCAF0); margin: 0 10px; text-decoration: none;">Módulos</a>
            </div>

            <div class="mt-4">
                <i class="fab fa-facebook-f me-3"></i>
                <i class="fab fa-instagram me-3"></i>
                <i class="fab fa-twitter me-3"></i>
            </div>

            <hr style="margin: 30px 0; border-color: rgba(255,255,255,0.1);">

            <div class="mt-4">
                <p style="font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 10px;">
                    Desarrollado por:
                    <strong>Kevin Ayazo, </strong>
                    <strong>Daniel Gómez, </strong>
                    <strong>Andrea Nieto, </strong> 
                    <strong>Santiago Saavedra</strong>
                </p>
            </div>

            <p style="font-size: 14px; color: rgba(255,255,255,0.5); margin: 0;">
                © 2026 MediControl — Universidad Cooperativa
            </p>

        </div>
    </footer>

</body>
</html>
